name: Deploy Backend to VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ ! -d .git ]; then
              git clone --branch main --single-branch https://github.com/${{ github.repository }} .
            fi
            git fetch origin main
            git reset --hard origin/main
            npm ci --omit=dev
            if [ -n "${{ secrets.DEPLOY_SERVICE_NAME }}" ] && command -v systemctl >/dev/null 2>&1; then
              sudo systemctl restart "${{ secrets.DEPLOY_SERVICE_NAME }}"
            else
              pkill -f "start-facility-helpdesk.js" || true
              nohup npm run start:facility-helpdesk > deploy.log 2>&1 &
            fi